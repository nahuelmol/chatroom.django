
<!DOCTYPE html>
<html>
<head>
	<title>About</title>
	<link rel="stylesheet" 
            href="https://bootswatch.com/4/yeti/bootstrap.css">
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
  		<div class="container-fluid">
                <a class="navbar-brand" href="{% url 'accounts:profile' %}">Profile</a>
    			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02" aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
      			<span class="navbar-toggler-icon"></span>
    			</button>
    			<div class="collapse navbar-collapse" id="navbarColor02">
              <ul class="navbar-nav me-auto">
                    {% if user %}
                      <li class="nav-item">
                        <a class="nav-link" href="">Logout</a>
                      </li>
                    {% else %}
                      <li class="nav-item">
                          <a class="nav-link active" href="{% url 'chatviews:login' %}">Login
                        </a>
                      </li>
                      <li class="nav-item">
                          <a class="nav-link" href="{% url 'chatviews:register' %}">Register</a>
                      </li>
                    {% endif %}
              </ul>
          </div>
  		</div>
	</nav>

	<div class="container">
		{% if messages %}
    		<ul class="container bg-dark p-5 text-white messages">
        		{% for message in messages %}
            		<li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        		{% endfor %}
   			</ul>
		{% endif %}
	</div>

	<div class="container p-5 text-center">
        <p>About me, who we are and those stuffs</p>
	</div>
</body>
</html>
